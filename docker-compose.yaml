services:
  web:
    image: nginx:latest
    container_name: assignment-web
    ports:
      - "5000:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
    networks:
      - assignment-network
    restart: on-failure

  db:
    image: mysql:8.0
    container_name: assignment-db
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: assignmentdb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - assignment-network
    restart: on-failure

networks:
  assignment-network:
    external: true

volumes:
  mysql-data:
    external: true
